global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  # Blackbox exporter pour surveiller le chat PHP
  - job_name: 'blackbox-chat'
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          # Cible : l'application chat (port 8081 sur l'hôte)
          - http://host.docker.internal:8081/
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - target_label: __address__
        replacement: blackbox:9115
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __param_target
        replacement: http://host.docker.internal:8081/
      - target_label: __param_module
        replacement: http_2xx
      - target_label: job
        replacement: chat-php
  # Prometheus lui-même
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
  # Alertmanager
  - job_name: 'alertmanager'
    static_configs:
      - targets: ['alertmanager:9093']
