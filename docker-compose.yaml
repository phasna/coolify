services:
  web:
    image: php:8.2-apache
    ports:
      - "8081:80"
    volumes:
      - .:/var/www/html
    depends_on:
      db:
        condition: service_healthy
    environment:
      - MARIADB_HOST=db
      - MARIADB_DATABASE=chat_db
      - MARIADB_USER=chat_user
      - MARIADB_PASSWORD=Motdepasse2026

  db:
    image: mariadb:10.6
    environment:
      MYSQL_DATABASE: chat_db
      MYSQL_USER: chat_user
      MYSQL_PASSWORD: Motdepasse2026
      MYSQL_ROOT_PASSWORD: Motdepasse2026
    volumes:
      - chat_db_data:/var/lib/mysql
      - ./web.sql:/docker-entrypoint-initdb.d/web.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pMotdepasse2026"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  chat_db_data:
