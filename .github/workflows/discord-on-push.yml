name: Discord notify on push

on:
  push:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Discord webhook
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -z "${DISCORD_WEBHOOK_URL:-}" ]; then
            echo "Missing DISCORD_WEBHOOK_URL secret"
            exit 1
          fi

          REPO="${GITHUB_REPOSITORY}"
          ACTOR="${GITHUB_ACTOR}"
          SHA="${GITHUB_SHA}"
          BRANCH="${GITHUB_REF_NAME}"
          COMMIT_MSG="${{ github.event.head_commit.message }}"

          SHORT_SHA="$(echo "$SHA" | cut -c1-8)"
          COMMIT_URL="https://github.com/${REPO}/commit/${SHA}"

          # Discord content max 2000 chars.
          MSG="🔔 Push sur **${BRANCH}**\nRepo: ${REPO}\nAuteur: ${ACTOR}\nCommit: \`${SHORT_SHA}\`\nMessage: ${COMMIT_MSG}\nLien: ${COMMIT_URL}"

          MSG="$MSG" python3 - <<'PY'
import json, os, urllib.request

url = os.environ["DISCORD_WEBHOOK_URL"]
msg = os.environ.get("MSG", "")

data = json.dumps({"content": msg[:1900]}).encode("utf-8")
req = urllib.request.Request(url, data=data, headers={"Content-Type": "application/json"})
with urllib.request.urlopen(req, timeout=10) as resp:
    if resp.status >= 400:
        raise SystemExit(f"Discord webhook HTTP {resp.status}")
print("ok")
PY
        shell: bash
