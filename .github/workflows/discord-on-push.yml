name: Discord notify on push

on:
  push:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Discord webhook
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.https://discord.com/api/webhooks/1486032579613167829/543Ob00NiOcIqhQsIA7u1wmXMeV47lLPQ2BID8TxCjzGSu8-8fbuPmGr9kxykj5Ovqc8 }}
        run: |
          if [ -z "${DISCORD_WEBHOOK_URL:-}" ]; then
            echo "Missing DISCORD_WEBHOOK_URL secret"
            exit 1
          fi

          REPO="${GITHUB_REPOSITORY}"
          ACTOR="${GITHUB_ACTOR}"
          SHA="${GITHUB_SHA}"
          BRANCH="${GITHUB_REF_NAME}"
          COMMIT_MSG="${{ github.event.head_commit.message }}"

          SHORT_SHA="$(echo "$SHA" | cut -c1-8)"
          COMMIT_URL="https://github.com/${REPO}/commit/${SHA}"

          # Discord content max 2000 chars.
          MSG="🔔 Push sur **${BRANCH}**\nRepo: ${REPO}\nAuteur: ${ACTOR}\nCommit: \`${SHORT_SHA}\`\nMessage: ${COMMIT_MSG}\nLien: ${COMMIT_URL}"

          payload="$(MSG="$MSG" python3 -c 'import json,os; print(json.dumps({"content": os.environ.get("MSG","")[:1900]}))')"
          curl -sS -H "Content-Type: application/json" -d "$payload" "$DISCORD_WEBHOOK_URL" >/dev/null
        shell: bash
