name: Discord notify on push

on:
  push:
    branches: ["main"]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Discord webhook
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          REPO: ${{ github.repository }}
          ACTOR: ${{ github.actor }}
          SHA: ${{ github.sha }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          if [ -z "${DISCORD_WEBHOOK_URL:-}" ]; then
            echo "Missing DISCORD_WEBHOOK_URL secret"
            exit 1
          fi

          SHORT_SHA="$(echo "$SHA" | cut -c1-8)"
          COMMIT_URL="https://github.com/${REPO}/commit/${SHA}"

          # Discord content max 2000 chars.
          MSG="**Push sur main**\nRepo: ${REPO}\nAuteur: ${ACTOR}\nCommit: \`${SHORT_SHA}\`\nMessage: ${COMMIT_MSG}\nLien: ${COMMIT_URL}"

          python - <<'PY'
import json, os, urllib.request
url = os.environ["DISCORD_WEBHOOK_URL"]
msg = os.environ["MSG"] if "MSG" in os.environ else ""
data = json.dumps({"content": msg[:1900]}).encode("utf-8")
req = urllib.request.Request(url, data=data, headers={"Content-Type": "application/json"})
with urllib.request.urlopen(req, timeout=10) as resp:
    if resp.status >= 400:
        raise SystemExit(f"Discord webhook HTTP {resp.status}")
print("ok")
PY
        shell: bash
        env:
          MSG: ${{ format('**Push sur main**\nRepo: {0}\nAuteur: {1}\nCommit: `{2}`\nMessage: {3}\nLien: https://github.com/{0}/commit/{4}', github.repository, github.actor, github.sha, github.event.head_commit.message, github.sha) }}

